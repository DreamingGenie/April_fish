<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 기본 OG 태그 -->
<meta property="og:type"        content="website" />
<meta property="og:title"       content="퀴즈 맞히면 선물 쏜다! 🎁" />
<meta property="og:description" content="기회는 단 5분! 정답자 3명에게 선물을 드립니다 🎀" />
<meta property="og:url"         content="https://[아이디].github.io/april-fool-quiz/quiz.html" />

<!-- 썸네일 이미지 (노란 배경 이미지 URL) -->
<meta property="og:image"       content="https://[아이디].github.io/april-fool-quiz/thumb.png" />
<meta property="og:image:width"  content="800" />
<meta property="og:image:height" content="400" />

<!-- 카카오톡 전용 -->
<meta property="kakao:title"       content="퀴즈 맞히면 선물 쏜다! 🎁" />
<meta property="kakao:description" content="기회는 단 5분! 지금 바로 도전하세요!" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>퀴즈 맞히면 선물 쏜다!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0 40px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    /* ── 상단 노란 헤더 ── */
    .header {
      background: #FFE033;
      padding: 32px 24px 28px;
      position: relative;
      overflow: hidden;
    }

    /* 배경 도형 장식 */
    .header::before,
    .header::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.25;
    }
    .header::before {
      width: 120px; height: 120px;
      background: #FFD000;
      top: -30px; left: -20px;
    }
    .header::after {
      width: 80px; height: 80px;
      background: #FFD000;
      top: 10px; right: -10px;
    }

    .deco-dots {
      position: absolute;
      top: 14px; right: 50%;
      transform: translateX(50%);
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.7;
    }

    .header-title {
      font-size: 28px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.3;
      text-align: center;
      position: relative;
      z-index: 1;
      letter-spacing: -1px;
    }

    /* Quiz 뱃지 */
    .quiz-badge-wrap {
      display: flex;
      justify-content: center;
      margin: 20px 0 12px;
      position: relative;
      z-index: 1;
    }
    .quiz-badge {
      background: #4DA8FF;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 18px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* 퀴즈 문제 박스 */
    .quiz-box {
      background: #FFFBE6;
      border-radius: 12px;
      margin: 0 16px;
      padding: 28px 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .quiz-question {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }

    /* ── 선물 정보 ── */
    .gift-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .gift-icon {
      width: 48px; height: 48px;
      background: #FFF3E0;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .gift-text-wrap {}
    .gift-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 3px;
    }
    .gift-text {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }

    /* ── 설명 텍스트 ── */
    .desc {
      padding: 20px 20px 4px;
      font-size: 15px;
      color: #333;
      line-height: 1.7;
      font-weight: 500;
    }

    /* ── 퀴즈 풀기 버튼 ── */
    .btn-wrap {
      padding: 14px 20px 20px;
    }
    .btn-quiz {
      display: block;
      width: 100%;
      padding: 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-quiz:hover { background: #e0e0e0; }
    .btn-quiz:active { background: #d0d0d0; }

    /* ── 카카오 선물하기 ── */
    .kakao-gift-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .kakao-gift-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #555;
      font-weight: 500;
    }
    .kakao-gift-left span.emoji { font-size: 18px; }
    .kakao-arrow { color: #aaa; font-size: 16px; }

    /* 타이머 표시 */
    .timer-bar {
      background: #FFE033;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #c8860a;
    }
    #countdown { color: #e63e00; }
  </style>
</head>
<body>

<div class="card">

  <!-- 타이머 -->
  <div class="timer-bar">
    ⏰ 남은 시간: <span id="countdown">05:00</span>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <div class="deco-dots"></div>
    <div class="header-title">퀴즈 맞히면<br>선물 쏜다!</div>

    <div class="quiz-badge-wrap">
      <span class="quiz-badge">Quiz</span>
    </div>

    <div class="quiz-box">
      <div class="quiz-question">저는 누구일까요? 3</div>
    </div>
  </div>

  <!-- 선물 안내 -->
  <div class="gift-row">
    <div class="gift-icon">🎁</div>
    <div class="gift-text-wrap">
      <div class="gift-label">퀴즈 당첨 선물</div>
      <div class="gift-text">결과와 함께 공개됩니다~!</div>
    </div>
  </div>

  <!-- 설명 -->
  <div class="desc">
    퀴즈 선물게임을 시작합니다!<br>
    기회는 단 5분간, 정답자 3명에게!
  </div>

  <!-- 버튼 -->
  <div class="btn-wrap">
    <a class="btn-quiz" href="april-fool.html">퀴즈 풀기</a>
  </div>

  <!-- 카카오 선물하기 -->
  <div class="kakao-gift-row">
    <div class="kakao-gift-left">
      <span class="emoji">🎀</span>
      카카오톡 선물하기
    </div>
    <span class="kakao-arrow">›</span>
  </div>

</div>

<script>
  // 5분 카운트다운
  let total = 5 * 60;
  const el = document.getElementById('countdown');

  function pad(n) { return String(n).padStart(2, '0'); }

  const timer = setInterval(() => {
    total--;
    if (total <= 0) { clearInterval(timer); el.textContent = '종료!'; return; }
    const m = Math.floor(total / 60);
    const s = total % 60;
    el.textContent = `${pad(m)}:${pad(s)}`;
  }, 1000);
</script>

</body>
</html>
