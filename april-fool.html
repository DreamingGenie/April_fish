<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>퀴즈 결과</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #FFE033;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .result-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px 36px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .fish-emoji {
      font-size: 80px;
      display: block;
      margin-bottom: 10px;
      animation: wiggle 0.6s 0.4s ease both;
    }
    @keyframes wiggle {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(-15deg); }
      50%  { transform: rotate(15deg); }
      75%  { transform: rotate(-10deg); }
      100% { transform: rotate(0deg); }
    }

    .april-badge {
      display: inline-block;
      background: #FF4757;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .result-title {
      font-size: 30px;
      font-weight: 900;
      color: #1a1a1a;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .result-title span { color: #FF4757; }

    .result-sub {
      font-size: 15px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 28px;
    }
    .result-sub strong { color: #1a1a1a; }

    /* 낚시 장면 */
    .fish-scene {
      background: #E8F4FD;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      font-size: 40px;
      letter-spacing: 4px;
    }

    /* 반응 버튼들 */
    .reaction-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .reaction-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .reaction-btn:active { transform: scale(0.95); opacity: 0.8; }
    .btn-angry  { background: #FFE5E5; color: #e63e00; }
    .btn-lol    { background: #FFFBE6; color: #c8860a; }
    .btn-back   {
      width: 100%;
      padding: 14px;
      background: #FFE033;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-back:hover { background: #FFD700; }

    /* 반응 후 메시지 */
    #reaction-msg {
      font-size: 18px;
      font-weight: 700;
      color: #FF4757;
      min-height: 28px;
      margin-bottom: 10px;
    }

    .footer-txt {
      font-size: 12px;
      color: #bbb;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<div class="result-card">

  <span class="fish-emoji">🎣</span>
  <div class="april-badge">🗓 April Fool's Day</div>

  <div class="result-title">
    낚이셨나요?<br><span>만우절</span> 입니다 😄
  </div>

  <div class="result-sub">
    선물 같은 건 없어요…<br>
    <strong>그냥 퀴즈도 없고, 선물도 없고!</strong><br>
    오직 당신의 반응만 있을 뿐 😂
  </div>

  <div class="fish-scene">
    🌊🎣🐟💨
  </div>

  <div id="reaction-msg"></div>

  <div class="reaction-row">
    <button class="reaction-btn btn-angry" onclick="react('angry')">
      😡 억울해요
    </button>
    <button class="reaction-btn btn-lol" onclick="react('lol')">
      😂 인정해요
    </button>
  </div>

  <button class="btn-back" onclick="history.back()">
    ← 돌아가서 다시 낚이기
  </button>

  <div class="footer-txt">만우절을 즐기세요 🐟</div>

</div>

<script>
  const msgs = {
    angry: [
      "어머, 억울하면 선물 사오세요 🎁",
      "화내봤자 선물 안 생겨요 ㅎㅎ",
      "이런 반응을 기다렸습니다 😈",
    ],
    lol: [
      "역시 현명하신 분! 근데 선물은 없어요 😂",
      "쿨하시네요~ 그래도 선물은 없음 🙃",
      "인정하는 자에게… 역시 선물 없음 ㅋㅋ",
    ]
  };

  function react(type) {
    const list = msgs[type];
    const msg  = list[Math.floor(Math.random() * list.length)];
    const el   = document.getElementById('reaction-msg');
    el.style.opacity = 0;
    setTimeout(() => {
      el.textContent = msg;
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = 1;
    }, 100);
  }
</script>

</body>
</html>
